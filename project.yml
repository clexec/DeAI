name: DeAI
options:
  bundleIdPrefix: com.clexec
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.clexec.deai
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  DeAI:
    type: application
    platform: iOS
    sources:
      - path: DeAIApp.swift
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Extensions
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.clexec.deai
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: De AI
        CFBundleName: DeAI
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "De AI uses the camera to capture images for AI analysis."
        NSMicrophoneUsageDescription: "De AI uses the microphone for voice messages."
        NSPhotoLibraryUsageDescription: "De AI accesses photos for image generation and editing."
        NSFaceIDUsageDescription: "De AI uses Face ID to secure your conversations."
        ITSAppUsesNonExemptEncryption: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
